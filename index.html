<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Durable Phone Repair - Quote Calculator</title>
        <style>
            body {
                background-color: #0a1628;
                background-image: linear-gradient(135deg, #0d2137 25%, #1a3a5c 50%, #0a1628 75%);
                color: white;
                font-family: Lato,  sans-serif;
                max-width: 600px;
                margin: 0 auto;
                font-size: 18px;
            }
            button {
                background-color: #1a6fd4;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 5px;
                cursor: pointer;
            }
            select {
                font-size: 16px;
                padding: 8px;
                width: 100%;
                margin-bottom: 10px;
            }
            button {
                font-size: 16px;
                padding: 10px 20px;
                width: 100%;
                margin-top: 5px;
            }
            
            h1 {
                color: #1a6fd4;
            }
            h2 {
                color: #1a6fd4;
            }
            body {
                padding: 30px;
            }
            #appleResult {
                color: #1a6fd4;
                font-size: 20px;
                font-weight: bold;
            }
            #samsungResult {
                color: #1a6fd4;
                font-size: 20px;
                font-weight: bold;
            }
            #logo {
                width: 200px;
                display: block;
                margin: 0 auto 20px auto;
                background-color: transparent;
                mix-blend-mode: screen;
            }
            #divider {
                border: none;
                border-top: 2px solid #1a6fd4;
                margin: 30px 0;
            }
            #appleBook button, #samsungBook button {
                background-color: #28a745;
                margin-top: 15px;
            }
            .card {
                background-color: #0d2137;
                border-radius: 10px;
                padding: 20px;
                margin-bottom: 20px;
            }
            @media (max-width: 600px) {
                html {
                    zoom: 1.3;
                }
            }
        </style>
        <script>
            function getQuote() {
                var model = document.getElementById("model").value 
                var repair = document.getElementById("repair").value 

                var prices = {
                    "iPhone XR": {"Screen Replacement": "$99.99", "Battery Replacement": "$49.99"},
                    "iPhone 11": {"Screen Replacement": "$99.99", "Battery Replacement": "$49.99"},
                    "iPhone 12": {"Screen Replacement": "$129.99", "Battery Replacement": "$54.99"},
                    "iPhone 13": {"Screen Replacement": "$129.99", "Battery Replacement": "$59.99"}
                }
                
                var price = prices[model][repair]
                document.getElementById("appleResult").innerHTML = "Price for " + model + " " + repair + ": " + price
                document.getElementById("appleBook").style.display = "block"
                document.getElementById("appleBook").href = "sms:4028048820?body=Hi, I'd like to book a " + model + " " + repair
            }
            function getSamsungQuote() {
                var model =document.getElementById("samsungModel").value 
                var repair = document.getElementById("samsungRepair").value 

                var prices = {
                    "Samsung A03s": {"Screen Replacement": "$54.99", "Battery Replacement": "$35.99"},
                    "Samsung A13": {"Screen Replacement": "$54.99", "Battery Replacement": "$35.99"},
                    "Samsung A14": {"Screen Replacement": "$54.99", "Battery Replacement": "$35.99"},
                    "Samsung A15": {"Screen Replacement": "$89.99", "Battery Replacement": "$35.99"},
                    "Samsung S21": {"Screen Replacement": "$129.99", "Battery Replacement": "$46.99"},
                    "Samsung S22": {"Screen Replacement": "$159.99", "Battery Replacement": "$51.99"},
                    "Samsung S23": {"Screen Replacement": "$169.99", "Battery Replacement": "$55.99"}
                }

                var price = prices[model][repair]
                document.getElementById("samsungResult").innerHTML = "Price for " + model + " " + repair + ": " + price
                document.getElementById("samsungBook").style.display = "block"
                document.getElementById("samsungBook").href = "sms:4028048820?body=Hi, I'd like to book a " + model + " " + repair
            }
        </script>
    </head>
<body>
    <img src="https://durablephonerepair.com/assets/images/image02.jpg" alt="Durable Phone Repair Logo" id="logo">
    <h1>Get a Repair Quote</h1>
    <div class="card">
    <h2>Apple Repairs</h2>
    <p>Select your iPhone model:</p>
    <select id="model">
        <option>iPhone XR</option>
        <option>iPhone 11</option>
        <option>iPhone 12</option>
        <option>iPhone 13</option>
    </select>
    <p>Select repair type:</p>
    <select id="repair">
        <option>Screen Replacement</option>
        <option>Battery Replacement</option>
    </select>
    <button onclick="getQuote()">Get Quote</button>
    <p id="appleResult"></p>
    <a id="appleBook" href="sms:4028048820" style="display:none">
        <button>Book This Repair</button>
    </a>
</div>
    <hr id="divider">
    <div class="card">
    <h2>Samsung Repairs</h2>
    <p>Select your Samsung model:</p>
    <select id="samsungModel">
        <option>Samsung A03s</option>
        <option>Samsung A13</option>
        <option>Samsung A14</option>
        <option>Samsung A15</option>
        <option>Samsung S21</option>
        <option>Samsung S22</option>
        <option>Samsung S23</option>
    </select>
    <p>Select repair type:</p>
    <select id="samsungRepair">
        <option>Screen Replacement</option>
        <option>Battery Replacement</option>
    </select>
    <button onclick="getSamsungQuote()">Get Quote</button>
    <p id="samsungResult"></p>
    <a id="samsungBook" href="sms:4028048820" style="display:none">
        <button>Book This Repair</button>
    </a>
</div>
</body>
</html>
